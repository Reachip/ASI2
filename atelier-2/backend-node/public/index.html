<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Input and Button Example</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
<div class="App">
    <div>
        <h1>User</h1>

        <input
                type="text"
                id="userID"
                placeholder="Votre ID"
        />

        <button id="userIDBtn">Mettre l'ID</button>

        <input
                type="text"
                id="inputField"
                placeholder="Saisissez quelque chose..."
        />
        <br/>
        <input
                type="text"
                id="IDDestination"
                placeholder="ID Destination"
        />

        <button id="sendButton">Envoyer le message</button>
    </div>
</div>

<script src="https://cdn.socket.io/4.8.0/socket.io.min.js" integrity="sha384-OoIbkvzsFFQAG88r+IqMAjyOtYDPGO0cqK5HF5Uosdy/zUEGySeAzytENMDynREd" crossorigin="anonymous"></script>
<script src="script.js"></script>

</body>
</html>
